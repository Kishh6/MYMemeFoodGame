<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Jom Makan — Malaysian Food Quiz</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<style>
:root {
  --bg: #0C0C0C;
  --surface: #141414;
  --surface2: #1E1E1E;
  --surface3: #282828;
  --border: rgba(255,255,255,0.07);
  --border2: rgba(255,255,255,0.12);
  --text: #EFEFEF;
  --muted: #666;
  --muted2: #999;
  --accent: #C8A96E;
  --accent2: #E8C98A;
  --green: #3D9970;
  --red: #C0392B;
  --green-bg: rgba(61,153,112,0.12);
  --red-bg: rgba(192,57,43,0.12);
}

* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; }

body {
  font-family: 'Inter', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  -webkit-font-smoothing: antialiased;
}

button { font: inherit; border: none; cursor: pointer; }
input { font: inherit; }

/* NOISE TEXTURE */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.03'/%3E%3C/svg%3E");
  pointer-events: none;
  z-index: 0;
  opacity: 0.4;
}

/* LAYOUT */
.app {
  position: relative;
  z-index: 1;
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 40px 16px;
}

.panel {
  width: 100%;
  max-width: 560px;
}

/* SCREENS */
.screen { display: none; animation: rise 0.4s cubic-bezier(0.16,1,0.3,1) both; }
.screen.active { display: block; }
@keyframes rise {
  from { opacity: 0; transform: translateY(16px); }
  to   { opacity: 1; transform: translateY(0); }
}

/* ── WELCOME ── */
.eyebrow {
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: var(--accent);
  margin-bottom: 20px;
}

.hero-title {
  font-family: 'Playfair Display', Georgia, serif;
  font-size: clamp(3.2rem, 10vw, 5.8rem);
  font-weight: 900;
  line-height: 0.92;
  letter-spacing: -0.02em;
  color: var(--text);
  margin-bottom: 20px;
}

.hero-title em {
  font-style: normal;
  color: var(--accent);
}

.divider {
  width: 40px;
  height: 2px;
  background: var(--accent);
  margin: 24px 0;
  opacity: 0.6;
}

.hero-desc {
  font-size: 15px;
  line-height: 1.7;
  color: var(--muted2);
  margin-bottom: 36px;
  max-width: 420px;
}

.input-group {
  display: flex;
  gap: 10px;
}

.name-input {
  flex: 1;
  height: 50px;
  padding: 0 16px;
  background: var(--surface2);
  border: 1px solid var(--border2);
  border-radius: 8px;
  color: var(--text);
  font-size: 14px;
  font-weight: 500;
  outline: none;
  transition: border-color 0.2s, background 0.2s;
}

.name-input::placeholder { color: var(--muted); }
.name-input:focus { border-color: var(--accent); background: var(--surface3); }
.name-input.shake { animation: shake 0.35s ease; }
@keyframes shake {
  0%,100% { transform: translateX(0); }
  25% { transform: translateX(-6px); }
  75% { transform: translateX(6px); }
}

.btn-primary {
  height: 50px;
  padding: 0 24px;
  background: var(--accent);
  color: #0C0C0C;
  border-radius: 8px;
  font-size: 14px;
  font-weight: 700;
  letter-spacing: 0.01em;
  white-space: nowrap;
  transition: background 0.2s, transform 0.15s;
}
.btn-primary:hover { background: var(--accent2); transform: translateY(-1px); }
.btn-primary:active { transform: translateY(0); }

.err { font-size: 12px; color: var(--red); margin-top: 10px; min-height: 16px; font-weight: 500; }

.category-strip {
  display: flex;
  gap: 8px;
  margin-top: 40px;
  flex-wrap: wrap;
}

.cat-tag {
  padding: 6px 14px;
  border-radius: 999px;
  border: 1px solid var(--border2);
  background: var(--surface2);
  font-size: 12px;
  font-weight: 600;
  color: var(--muted2);
  letter-spacing: 0.02em;
}

/* ── GAME ── */
.game-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 24px;
}

.player-label {
  font-size: 13px;
  font-weight: 600;
  color: var(--muted2);
  max-width: 180px;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}

.score-label {
  font-family: 'Playfair Display', serif;
  font-size: 22px;
  font-weight: 700;
  color: var(--accent);
}

.progress-track {
  height: 3px;
  background: var(--surface3);
  border-radius: 999px;
  margin-bottom: 32px;
  overflow: hidden;
}

.progress-fill {
  height: 100%;
  background: var(--accent);
  border-radius: 999px;
  transition: width 0.5s cubic-bezier(0.4,0,0.2,1);
}

.q-meta {
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: var(--muted);
  margin-bottom: 14px;
  display: flex;
  align-items: center;
  gap: 12px;
}

.q-meta .sep { width: 1px; height: 12px; background: var(--border2); }

.clue-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 48px 24px;
  text-align: center;
  margin-bottom: 20px;
  position: relative;
  overflow: hidden;
}

.clue-card::before {
  content: '';
  position: absolute;
  inset: 0;
  background: radial-gradient(ellipse 80% 60% at 50% 50%, rgba(200,169,110,0.05), transparent);
  pointer-events: none;
}

.clue-text {
  font-size: clamp(2.8rem, 9vw, 5rem);
  letter-spacing: 0.08em;
  line-height: 1;
}

.options-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 8px;
  margin-bottom: 0;
}

.opt {
  padding: 18px 16px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 10px;
  color: var(--text);
  font-size: 14px;
  font-weight: 600;
  text-align: left;
  transition: border-color 0.15s, background 0.15s, transform 0.15s;
  position: relative;
}

.opt:hover:not(:disabled) {
  background: var(--surface2);
  border-color: var(--border2);
  transform: translateY(-2px);
}

.opt:disabled { cursor: default; }

.opt.correct {
  background: var(--green-bg);
  border-color: var(--green);
  color: #5DBF96;
}

.opt.wrong {
  background: var(--red-bg);
  border-color: var(--red);
  color: #E06C5E;
}

.opt.dim { opacity: 0.28; }

/* ── REACTION OVERLAY ── */
.overlay {
  position: fixed;
  inset: 0;
  z-index: 50;
  background: rgba(0,0,0,0.82);
  backdrop-filter: blur(16px);
  display: none;
  align-items: center;
  justify-content: center;
  padding: 20px;
}
.overlay.active { display: flex; animation: fadeIn 0.2s ease; }
@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

.modal {
  width: 100%;
  max-width: 480px;
  background: var(--surface);
  border: 1px solid var(--border2);
  border-radius: 20px;
  overflow: hidden;
  animation: slideUp 0.35s cubic-bezier(0.16,1,0.3,1) both;
}
@keyframes slideUp {
  from { opacity: 0; transform: translateY(24px) scale(0.97); }
  to   { opacity: 1; transform: translateY(0) scale(1); }
}

.modal.good { border-color: rgba(61,153,112,0.3); }
.modal.bad  { border-color: rgba(192,57,43,0.25); }

.reaction-panel {
  padding: 40px 32px 32px;
  text-align: center;
  position: relative;
  min-height: 240px;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 12px;
}

.reaction-panel.good { background: linear-gradient(160deg, #0a1f16, #0d2b1e); }
.reaction-panel.bad  { background: linear-gradient(160deg, #1a0a0a, #221010); }

.reaction-icon {
  font-size: 4rem;
  line-height: 1;
  animation: iconBounce 0.6s cubic-bezier(0.34,1.56,0.64,1) both;
}
@keyframes iconBounce {
  from { transform: scale(0.5); opacity: 0; }
  to   { transform: scale(1); opacity: 1; }
}

.reaction-headline {
  font-family: 'Playfair Display', serif;
  font-size: clamp(1.6rem, 5vw, 2.2rem);
  font-weight: 900;
  letter-spacing: -0.02em;
  color: #fff;
}

.reaction-sub {
  font-size: 13px;
  color: rgba(255,255,255,0.45);
  font-weight: 500;
  letter-spacing: 0.06em;
  text-transform: uppercase;
}

.modal-footer {
  padding: 20px 24px;
  border-top: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  gap: 12px;
}

.answer-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  font-size: 13px;
}

.answer-label { color: var(--muted); font-weight: 500; }
.answer-value { font-weight: 700; color: var(--accent); }

.btn-next {
  width: 100%;
  height: 48px;
  background: var(--accent);
  color: #0C0C0C;
  border-radius: 8px;
  font-size: 14px;
  font-weight: 700;
  letter-spacing: 0.02em;
  transition: background 0.2s, transform 0.15s;
}
.btn-next:hover { background: var(--accent2); transform: translateY(-1px); }

/* ── RESULT ── */
.result-wrap {
  text-align: center;
  padding: 8px 0 32px;
}

.result-eyebrow {
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: var(--muted);
  margin-bottom: 16px;
}

.score-display {
  font-family: 'Playfair Display', serif;
  font-size: clamp(5rem, 18vw, 9rem);
  font-weight: 900;
  line-height: 1;
  letter-spacing: -0.04em;
  color: var(--accent);
  margin-bottom: 4px;
}

.score-denom {
  font-size: clamp(1.5rem, 5vw, 2.5rem);
  color: var(--muted);
  font-weight: 400;
}

.rank-line {
  font-family: 'Playfair Display', serif;
  font-size: clamp(1.4rem, 4vw, 2rem);
  font-weight: 700;
  color: var(--text);
  margin: 16px 0 10px;
}

.result-copy {
  font-size: 14px;
  color: var(--muted2);
  line-height: 1.65;
  max-width: 380px;
  margin: 0 auto 32px;
}

.btn-replay {
  height: 50px;
  padding: 0 36px;
  background: var(--surface2);
  border: 1px solid var(--border2);
  color: var(--text);
  border-radius: 8px;
  font-size: 14px;
  font-weight: 700;
  transition: background 0.2s, transform 0.15s;
}
.btn-replay:hover { background: var(--surface3); transform: translateY(-1px); }

/* CONFETTI */
.confetti-wrap { position: fixed; inset: 0; pointer-events: none; z-index: 99; overflow: hidden; }
.c-piece {
  position: absolute;
  top: -20px;
  width: 8px; height: 14px;
  border-radius: 2px;
  animation: cfall var(--d) linear forwards;
}
@keyframes cfall {
  0%   { transform: translateY(0) rotate(0deg); opacity: 1; }
  100% { transform: translateY(110vh) rotate(600deg); opacity: 0; }
}

@media (max-width: 480px) {
  .options-grid { grid-template-columns: 1fr; }
  .input-group  { flex-direction: column; }
  .btn-primary  { width: 100%; }
  .clue-card    { padding: 36px 16px; }
}

@media (prefers-reduced-motion: reduce) {
  *, *::before, *::after {
    animation-duration: 0.001ms !important;
    transition-duration: 0.001ms !important;
  }
}
</style>
</head>
<body>

<div class="confetti-wrap" id="confetti"></div>

<div class="app">
  <div class="panel">

    <!-- WELCOME -->
    <section class="screen active" id="s-welcome">
      <p class="eyebrow">Malaysian Food Quiz</p>
      <h1 class="hero-title">Jom<br><em>Makan.</em></h1>
      <div class="divider"></div>
      <p class="hero-desc">Ten questions. Three cuisines. How well do you really know Malaysian food?</p>

      <div class="input-group">
        <input id="nameInput" class="name-input" type="text" maxlength="18" placeholder="Your name" autocomplete="off"/>
        <button class="btn-primary" id="startBtn">Begin</button>
      </div>
      <p class="err" id="errMsg"></p>

      <div class="category-strip">
        <span class="cat-tag">Malay</span>
        <span class="cat-tag">Chinese</span>
        <span class="cat-tag">Indian</span>
        <span class="cat-tag">10 Questions</span>
        <span class="cat-tag">+10 pts each</span>
      </div>
    </section>

    <!-- GAME -->
    <section class="screen" id="s-game">
      <div class="game-header">
        <span class="player-label" id="playerLabel">Player</span>
        <span class="score-label" id="scoreLabel">0</span>
      </div>

      <div class="progress-track">
        <div class="progress-fill" id="progressFill" style="width:10%"></div>
      </div>

      <div class="q-meta">
        <span id="qNum">Question 1</span>
        <span class="sep"></span>
        <span id="catLabel">Malay</span>
      </div>

      <div class="clue-card">
        <div class="clue-text" id="clueText">🍚🥥🌶️🥜</div>
      </div>

      <div class="options-grid" id="optGrid"></div>
    </section>

    <!-- RESULT -->
    <section class="screen" id="s-result">
      <div class="result-wrap">
        <p class="result-eyebrow">Quiz Complete</p>
        <div class="score-display" id="scoreDisplay">0<span class="score-denom">/100</span></div>
        <p class="rank-line" id="rankLine">—</p>
        <p class="result-copy" id="resultCopy">—</p>
        <button class="btn-replay" id="replayBtn">Play Again</button>
      </div>
    </section>

  </div>
</div>

<!-- REACTION MODAL -->
<div class="overlay" id="overlay">
  <div class="modal" id="modal">
    <div class="reaction-panel" id="reactionPanel">
      <div class="reaction-icon" id="reactionIcon">—</div>
      <p class="reaction-headline" id="reactionHeadline">—</p>
      <p class="reaction-sub" id="reactionSub">—</p>
    </div>
    <div class="modal-footer">
      <div class="answer-row">
        <span class="answer-label">Correct answer</span>
        <span class="answer-value" id="answerVal">—</span>
      </div>
      <button class="btn-next" id="nextBtn">Next question</button>
    </div>
  </div>
</div>

<script>
const QS = [
  {
    emoji:"🍚🥥🌶️🥜", cat:"Malay", answer:"Nasi Lemak",
    opts:["Nasi Goreng","Nasi Lemak","Nasi Dagang","Nasi Kerabu"],
    ok:{icon:"✓",hl:"Betul.",sub:"nasi lemak is the national dish for a reason"},
    no:{icon:"✗",hl:"Aiyo.",sub:"coconut rice + sambal + peanuts = nasi lemak"}
  },
  {
    emoji:"🥩🍢🔥🥜", cat:"Malay", answer:"Satay",
    opts:["Kebab","Rendang","Satay","Ayam Percik"],
    ok:{icon:"✓",hl:"Correct.",sub:"grilled meat on a stick with peanut sauce"},
    no:{icon:"✗",hl:"Close.",sub:"that's satay — skewered, grilled, dipped in peanut sauce"}
  },
  {
    emoji:"🐄🥥🌶️🍖", cat:"Malay", answer:"Rendang",
    opts:["Kari Daging","Rendang","Asam Pedas","Sup Daging"],
    ok:{icon:"✓",hl:"Steady.",sub:"slow-cooked dry beef curry — the real deal"},
    no:{icon:"✗",hl:"Salah.",sub:"rendang — beef braised in coconut milk and spices"}
  },
  {
    emoji:"🍌🍃🥥🍬", cat:"Malay", answer:"Kuih Lepat Pisang",
    opts:["Cendol","Ondeh Ondeh","Kuih Seri Muka","Kuih Lepat Pisang"],
    ok:{icon:"✓",hl:"Bagus.",sub:"banana wrapped in banana leaf with coconut filling"},
    no:{icon:"✗",hl:"Alamak.",sub:"kuih lepat pisang — banana, coconut, wrapped in leaf"}
  },
  {
    emoji:"🍜🥚🔥🦐", cat:"Chinese", answer:"Char Kuey Teow",
    opts:["Hokkien Mee","Wantan Mee","Char Kuey Teow","Pan Mee"],
    ok:{icon:"✓",hl:"Shiok.",sub:"flat rice noodles stir-fried over screaming hot wok"},
    no:{icon:"✗",hl:"Aduh.",sub:"char kuey teow — noodles, egg, prawn, bean sprouts, wok hei"}
  },
  {
    emoji:"🍖🌿🧄♨️", cat:"Chinese", answer:"Bak Kut Teh",
    opts:["Tom Yam","Sup Tulang","Steamboat","Bak Kut Teh"],
    ok:{icon:"✓",hl:"Power.",sub:"pork ribs simmered in herbal broth — a classic"},
    no:{icon:"✗",hl:"Haiya.",sub:"bak kut teh — pork ribs in spiced herbal soup"}
  },
  {
    emoji:"🍚🐔🥢🫕", cat:"Chinese", answer:"Nasi Ayam",
    opts:["Nasi Lemak","Claypot Rice","Nasi Goreng","Nasi Ayam"],
    ok:{icon:"✓",hl:"Yes.",sub:"hainanese chicken rice — simple but never boring"},
    no:{icon:"✗",hl:"Off.",sub:"nasi ayam — poached chicken over fragrant rice"}
  },
  {
    emoji:"🫓🧈🍛", cat:"Indian", answer:"Roti Canai",
    opts:["Capati","Naan","Roti Canai","Tosai"],
    ok:{icon:"✓",hl:"Lepak.",sub:"flaky flatbread with dhal or curry — mamak staple"},
    no:{icon:"✗",hl:"Teruk.",sub:"roti canai — layered flatbread, best at the mamak"}
  },
  {
    emoji:"🍵🥛☕🧊", cat:"Indian", answer:"Teh Tarik",
    opts:["Kopi O","Bandung","Milo Ais","Teh Tarik"],
    ok:{icon:"✓",hl:"Solid.",sub:"pulled tea — poured high for that frothy finish"},
    no:{icon:"✗",hl:"Sayang.",sub:"teh tarik — sweet milk tea pulled between cups"}
  },
  {
    emoji:"🍚🌶️🍅🐔", cat:"Indian", answer:"Nasi Briyani",
    opts:["Nasi Goreng","Kari Ayam","Nasi Briyani","Nasi Kandar"],
    ok:{icon:"✓",hl:"Legend.",sub:"fragrant basmati rice with spiced chicken — proper"},
    no:{icon:"✗",hl:"So close.",sub:"nasi briyani — spiced rice cooked with chicken and aromatics"}
  }
];

const G = { name:"", q:0, score:0, locked:false, ctx:null };
const $ = id => document.getElementById(id);

function show(id) {
  ["s-welcome","s-game","s-result"].forEach(s => {
    const el=$(s);
    el.classList.remove("active");
    el.style.animation="none";
  });
  const t=$(id);
  void t.offsetWidth;
  t.style.animation="";
  t.classList.add("active");
}

function initAudio() {
  if(G.ctx) return;
  try { G.ctx = new(window.AudioContext||window.webkitAudioContext)(); } catch(e){}
}

function beep(type) {
  if(!G.ctx) return;
  const map = {
    click:   [320, 0.04, "sine"],
    correct: [660, 0.13, "triangle"],
    wrong:   [140, 0.18, "sawtooth"],
    win:     [880, 0.2,  "triangle"]
  };
  const [f,d,w] = map[type]||map.click;
  const now = G.ctx.currentTime;
  const o = G.ctx.createOscillator(), g = G.ctx.createGain();
  o.type=w; o.frequency.value=f;
  g.gain.setValueAtTime(0.0001, now);
  g.gain.exponentialRampToValueAtTime(0.1, now+0.015);
  g.gain.exponentialRampToValueAtTime(0.0001, now+d);
  o.connect(g); g.connect(G.ctx.destination);
  o.start(now); o.stop(now+d+0.05);
  if(type==="correct"||type==="win") {
    setTimeout(()=>{
      const n=G.ctx.currentTime,o2=G.ctx.createOscillator(),g2=G.ctx.createGain();
      o2.type="triangle"; o2.frequency.value=type==="win"?1100:840;
      g2.gain.setValueAtTime(0.0001,n);
      g2.gain.exponentialRampToValueAtValue(0.08,n+0.015);
      g2.gain.exponentialRampToValueAtTime(0.0001,n+0.12);
      o2.connect(g2); g2.connect(G.ctx.destination);
      o2.start(n); o2.stop(n+0.18);
    },110);
  }
}

$("startBtn").addEventListener("click", start);
$("nameInput").addEventListener("keydown", e=>{ if(e.key==="Enter") start(); });
document.addEventListener("click", ()=>initAudio(), {once:true});

function start() {
  initAudio();
  const raw = $("nameInput").value.trim().replace(/[<>]/g,"");
  if(!raw) {
    const inp=$("nameInput");
    inp.classList.remove("shake"); void inp.offsetWidth; inp.classList.add("shake");
    $("errMsg").textContent="Enter your name to begin.";
    beep("wrong"); return;
  }
  $("errMsg").textContent="";
  G.name=raw; G.q=0; G.score=0; G.locked=false;
  beep("click"); show("s-game"); renderQ();
}

function renderQ() {
  G.locked=false;
  const q=QS[G.q];
  $("playerLabel").textContent=G.name;
  $("scoreLabel").textContent=G.score+" pts";
  $("progressFill").style.width=`${((G.q+1)/QS.length)*100}%`;
  $("qNum").textContent=`Question ${G.q+1}`;
  $("catLabel").textContent=q.cat;
  $("clueText").textContent=q.emoji;

  const grid=$("optGrid"); grid.innerHTML="";
  q.opts.forEach(opt=>{
    const b=document.createElement("button");
    b.className="opt"; b.textContent=opt; b.type="button";
    b.addEventListener("click",()=>pick(opt,b));
    grid.appendChild(b);
  });
}

function pick(sel, btn) {
  if(G.locked) return;
  G.locked=true;
  const q=QS[G.q];
  const ok=sel===q.answer;
  if(ok){G.score+=10; beep("correct");}else{beep("wrong");}
  [...$("optGrid").querySelectorAll(".opt")].forEach(b=>{
    b.disabled=true;
    if(b.textContent===q.answer) b.classList.add("correct");
    else if(b===btn&&!ok) b.classList.add("wrong");
    else b.classList.add("dim");
  });
  $("scoreLabel").textContent=G.score+" pts";
  setTimeout(()=>openModal(ok),500);
}

function openModal(ok) {
  const q=QS[G.q];
  const m=ok?q.ok:q.no;
  $("modal").className="modal "+(ok?"good":"bad");
  $("reactionPanel").className="reaction-panel "+(ok?"good":"bad");
  $("reactionIcon").textContent=m.icon;
  $("reactionHeadline").textContent=m.hl;
  $("reactionSub").textContent=m.sub;
  $("answerVal").textContent=q.answer;
  $("overlay").classList.add("active");
}

$("nextBtn").addEventListener("click",()=>{
  beep("click");
  $("overlay").classList.remove("active");
  G.q++;
  if(G.q>=QS.length) showResult(); else renderQ();
});

function showResult() {
  show("s-result");
  const n=G.score/10;
  let rank,copy;
  if(n>=9){rank="Makan Legend";copy=`${G.name}, you know Malaysian food better than most locals. Respect.`;confetti();beep("win");}
  else if(n>=6){rank="Boleh Tahan";copy=`Good effort, ${G.name}. You can confidently order for the whole table.`;beep("correct");}
  else if(n>=3){rank="Okay Lah";copy=`Not bad, ${G.name}. A few more mamak sessions and you'll nail it.`;beep("click");}
  else{rank="First Timer";copy=`${G.name}, time to eat your way through Malaysia. Start at the nearest hawker stall.`;beep("wrong");}
  $("rankLine").textContent=rank;
  $("resultCopy").textContent=copy;
  animScore(0,G.score,900);
}

function animScore(from,to,dur) {
  const start=performance.now();
  function tick(now){
    const p=Math.min((now-start)/dur,1);
    const ease=1-Math.pow(1-p,3);
    const v=Math.round(from+(to-from)*ease);
    $("scoreDisplay").innerHTML=`${v}<span class="score-denom">/100</span>`;
    if(p<1) requestAnimationFrame(tick);
  }
  requestAnimationFrame(tick);
}

$("replayBtn").addEventListener("click",()=>{
  beep("click"); G.q=0; G.score=0; G.locked=false;
  show("s-game"); renderQ();
});

function confetti() {
  const layer=$("confetti"); layer.innerHTML="";
  const cols=["#C8A96E","#E8C98A","#3D9970","#fff","#C0392B","#F0C040"];
  for(let i=0;i<70;i++){
    const p=document.createElement("span");
    p.className="c-piece";
    p.style.left=Math.random()*100+"%";
    p.style.background=cols[i%cols.length];
    p.style.setProperty("--d",(2+Math.random()*2.5)+"s");
    p.style.animationDelay=(Math.random()*0.7)+"s";
    layer.appendChild(p);
    setTimeout(()=>p.remove(),5000);
  }
}
</script>
</body>
</html>
